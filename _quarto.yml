project:
  type: book

book:
  title: "Introduction to Computational Chemistry"
  author: "Norah Jones"
  date: "4/30/2026"
  
  chapters:
    - index.qmd
    - part: "Module 1: Foundations & 1D Quantum"
      chapters: 
        - notebooks/week_1_python_primer.ipynb
    
    - part: "Appendices"
